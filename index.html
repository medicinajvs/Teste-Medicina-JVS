<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checklist de Teste - Flashcards IA</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      padding: 24px;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
    }

    .hero {
      background: linear-gradient(135deg, #4f46e5, #7c3aed, #0f172a);
      border-radius: 24px;
      padding: 32px;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 34px;
    }

    .progress-wrap {
      background: rgba(255,255,255,0.2);
      height: 14px;
      border-radius: 999px;
      margin-top: 20px;
      overflow: hidden;
    }

    .progress {
      height: 100%;
      width: 0%;
      background: white;
      transition: width .3s;
    }

    .stats {
      margin-top: 12px;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }

    .card {
      background: #111827;
      border: 1px solid #334155;
      border-radius: 18px;
      padding: 18px;
    }

    .card.done {
      border-color: #10b981;
      background: rgba(16,185,129,0.12);
    }

    .card label {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      cursor: pointer;
    }

    input[type="checkbox"] {
      width: 22px;
      height: 22px;
      accent-color: #10b981;
      margin-top: 2px;
    }

    h2 {
      margin: 0 0 8px;
      font-size: 18px;
      color: white;
    }

    p {
      margin: 0;
      color: #cbd5e1;
      line-height: 1.45;
      font-size: 14px;
    }

    .success {
      margin-top: 10px;
      color: #86efac;
      font-size: 13px;
    }

    .final {
      display: none;
      margin-top: 24px;
      padding: 24px;
      border-radius: 20px;
      background: rgba(16,185,129,0.15);
      border: 1px solid #10b981;
      text-align: center;
    }

    .final.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="hero">
      <h1>Teste Final — Flashcards IA</h1>
      <p>Complete as missões abaixo para validar se o site está funcionando corretamente.</p>

      <div class="progress-wrap">
        <div id="progress" class="progress"></div>
      </div>

      <div id="stats" class="stats">0% concluído</div>
    </section>

    <section class="grid" id="checklist">
      <div class="card">
        <label>
          <input type="checkbox">
          <div>
            <h2>1. Abrir o site</h2>
            <p>Abra a página publicada e veja se carrega sem erro inicial.</p>
            <div class="success">Passou se: a tela inicial aparece normalmente.</div>
          </div>
        </label>
      </div>

      <div class="card">
        <label>
          <input type="checkbox">
          <div>
            <h2>2. Enviar vídeo</h2>
            <p>Envie um vídeo curto, de preferência entre 30 segundos e 2 minutos.</p>
            <div class="success">Passou se: o arquivo é aceito e o botão processar fica ativo.</div>
          </div>
        </label>
      </div>

      <div class="card">
        <label>
          <input type="checkbox">
          <div>
            <h2>3. Processar vídeo</h2>
            <p>Clique em iniciar processamento e aguarde.</p>
            <div class="success">Passou se: a transcrição aparece sem erro.</div>
          </div>
        </label>
      </div>

      <div class="card">
        <label>
          <input type="checkbox">
          <div>
            <h2>4. Flashcards</h2>
            <p>Verifique se foram gerados flashcards com pergunta, resposta e nota.</p>
            <div class="success">Passou se: os cards aparecem e fazem sentido.</div>
          </div>
        </label>
      </div>

      <div class="card">
        <label>
          <input type="checkbox">
          <div>
            <h2>5. Análise de evidência</h2>
            <p>Rode a análise de evidência da aula.</p>
            <div class="success">Passou se: aparecem tópicos, lacunas, sugestões e fontes.</div>
          </div>
        </label>
      </div>

      <div class="card">
        <label>
          <input type="checkbox">
          <div>
            <h2>6. Texto enriquecido</h2>
            <p>Gere o texto enriquecido a partir da análise.</p>
            <div class="success">Passou se: o texto aparece mais completo que a transcrição.</div>
          </div>
        </label>
      </div>

      <div class="card">
        <label>
          <input type="checkbox">
          <div>
            <h2>7. Histórico</h2>
            <p>Recarregue o site e abra o item salvo no histórico.</p>
            <div class="success">Passou se: transcrição, cards e análise continuam salvos.</div>
          </div>
        </label>
      </div>

      <div class="card">
        <label>
          <input type="checkbox">
          <div>
            <h2>8. Biblioteca</h2>
            <p>Crie um deck e salve flashcards nele.</p>
            <div class="success">Passou se: deck e cards aparecem na biblioteca.</div>
          </div>
        </label>
      </div>

      <div class="card">
        <label>
          <input type="checkbox">
          <div>
            <h2>9. Sessão de estudo</h2>
            <p>Inicie uma sessão por deck, favoritos ou vencidos.</p>
            <div class="success">Passou se: os cards aparecem para estudo e revisão.</div>
          </div>
        </label>
      </div>

      <div class="card">
        <label>
          <input type="checkbox">
          <div>
            <h2>10. Celular</h2>
            <p>Abra o site no celular ou reduza a janela do navegador.</p>
            <div class="success">Passou se: o layout continua usável.</div>
          </div>
        </label>
      </div>
    </section>

    <section id="final" class="final">
      <h1>✅ Teste concluído</h1>
      <p>O fluxo principal do Flashcards IA foi validado.</p>
    </section>
  </div>

  <script>
    const checkboxes = document.querySelectorAll('input[type="checkbox"]');
    const progress = document.getElementById('progress');
    const stats = document.getElementById('stats');
    const final = document.getElementById('final');

    function updateProgress() {
      const total = checkboxes.length;
      const done = Array.from(checkboxes).filter(c => c.checked).length;
      const percent = Math.round((done / total) * 100);

      progress.style.width = percent + '%';
      stats.textContent = percent + '% concluído — ' + done + ' de ' + total + ' missões';

      checkboxes.forEach((checkbox) => {
        checkbox.closest('.card').classList.toggle('done', checkbox.checked);
      });

      final.classList.toggle('show', percent === 100);
    }

    checkboxes.forEach((checkbox) => {
      checkbox.addEventListener('change', updateProgress);
    });

    updateProgress();
  </script>
</body>
</html>
